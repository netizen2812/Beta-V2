workerPoolSpecs:
  machineSpec:
    machineType: n1-standard-4
    acceleratorType: NVIDIA_TESLA_T4
    acceleratorCount: 1
  replicaCount: 1
  containerSpec:
    imageUri: us-docker.pkg.dev/vertex-ai/training/pytorch-gpu.2-2.py310:latest
    command:
    - bash
    - -c
    - |
      pip install coqui-trainer
      python3 -c "from trainer import TrainerArgs; import inspect; print(inspect.signature(TrainerArgs.__init__))"


workerPoolSpecs:
  - machineSpec:
      machineType: n1-standard-4
      acceleratorType: NVIDIA_TESLA_T4
      acceleratorCount: 1
    replicaCount: 1
    containerSpec:
      imageUri: us-docker.pkg.dev/vertex-ai/training/pytorch-gpu.2-2.py310:latest
      command:
        - bash
        - -c
      args:
        - |
          export USE_XLA=0
          export PJRT_DEVICE=CPU
          pip uninstall -y torch-xla
          pip install TTS==0.22.0
          gcloud storage cp gs://maulana-urdu-forge-project-ffb3710a/generate_en_sample.py generate.py
          python3 generate.py
